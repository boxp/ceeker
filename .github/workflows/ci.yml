name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      ci_required: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ci:
              - 'src/**'
              - 'test/**'
              - 'e2e/**'
              - 'resources/**'
              - 'deps.edn'
              - 'build.clj'
              - '.clj-kondo/**'
              - '.github/workflows/ci.yml'

  lint:
    needs: changes
    if: needs.changes.outputs.ci_required == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeLaGuardo/setup-clojure@13.1
        with:
          cli: latest

      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.clojure/.cpcache
          key: ${{ runner.os }}-clojure-${{ hashFiles('deps.edn') }}
          restore-keys: ${{ runner.os }}-clojure-

      - name: Lint
        run: clojure -M:lint

      - name: Format check
        run: clojure -M:format-check

  test:
    needs: changes
    if: needs.changes.outputs.ci_required == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeLaGuardo/setup-clojure@13.1
        with:
          cli: latest

      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.clojure/.cpcache
          key: ${{ runner.os }}-clojure-${{ hashFiles('deps.edn') }}
          restore-keys: ${{ runner.os }}-clojure-

      - name: Test
        run: clojure -M:test

  native-e2e:
    needs: changes
    if: needs.changes.outputs.ci_required == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          native-image-job-reports: 'true'

      - uses: DeLaGuardo/setup-clojure@13.1
        with:
          cli: latest

      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.clojure/.cpcache
          key: ${{ runner.os }}-clojure-native-${{ hashFiles('deps.edn') }}
          restore-keys: ${{ runner.os }}-clojure-native-

      - name: Build uberjar
        run: clojure -T:build uber

      - name: Build native image
        run: |
          native-image \
            -jar target/ceeker.jar \
            -o ceeker

      - name: Install tmux
        run: sudo apt-get install -y tmux

      - name: Run native E2E tests
        run: |
          chmod +x e2e/native-e2e.sh
          ./e2e/native-e2e.sh ./ceeker

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: native-e2e-diagnostics
          path: e2e-diagnostics/
          retention-days: 7
